<!DOCTYPE html>
<html lang="en">
<head>
    <title>MyLibrary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        /* Navbar */
        .navbar {
            border-radius: 14px;
            margin: 16px auto 24px;
            max-width: 1100px;
            padding: 12px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        .nav-link {
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.15);
        }

        .nav-link.text-danger:hover {
            background: rgba(220,53,69,0.2);
        }

        /* Page container */
        .app-container {
            max-width: 1100px;
        }

        /* Alerts */
        .alert {
            border-radius: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container app-container d-flex align-items-center">

    <a class="navbar-brand" href="{% url 'book_list' %}">MyLibrary</a>

{% if user.is_authenticated %}
    <ul class="navbar-nav flex-row ms-auto align-items-center">

      <li class="nav-item me-2">
        <a class="nav-link text-white" href="{% url 'book_list' %}">Books</a>
      </li>

      <li class="nav-item me-2">
        <a class="nav-link text-white" href="{% url 'add_member' %}">Add Member</a>
      </li>

      <li class="nav-item me-2">
        <a class="nav-link text-white" href="{% url 'members_list' %}">Members</a>
      </li>

      <li class="nav-item me-2">
        <a class="nav-link text-white" href="{% url 'search_card' %}">Search Member</a>
      </li>

      <li class="nav-item me-2">
        <a class="nav-link text-white" href="{% url 'add_book' %}">Add Book</a>
      </li>

      <li class="nav-item me-2">
        <a class="nav-link text-white" href="{% url 'member_login' %}">Member Login</a>
      </li>

      <li class="nav-item">
        <a class="nav-link text-danger" href="{% url 'admin_logout' %}">Logout</a>
      </li>

    </ul>
{% endif %}

  </div>
</nav>

<div class="container app-container mt-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-3">
            {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
